<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nido Wars</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="game-shell" data-app-root>
      <canvas id="game-canvas" aria-label="Nido Wars realtime desert island map"></canvas>

      <header class="hud hud-top" aria-label="Game status">
        <dl class="resource-strip">
          <div class="cycle-item">
            <dt class="sr-only">Day and night cycle</dt>
            <dd class="cycle-meter" data-ui="cycle" data-phase="day" aria-label="Day">
              <span class="cycle-clock" aria-hidden="true">
                <span class="cycle-hand" data-ui="cycle-hand"></span>
              </span>
            </dd>
          </div>
          <div class="resource-item">
            <dt class="sr-only">Gold</dt>
            <dd class="resource-value">
              <img src="./assets/gold.png" alt="" />
              <span data-ui="gold">0</span>
            </dd>
          </div>
          <div class="resource-item">
            <dt class="sr-only">Herbs</dt>
            <dd class="resource-value">
              <img src="./assets/herbs.svg" alt="" />
              <span data-ui="herbs">0</span>
            </dd>
          </div>
          <div class="resource-item">
            <dt class="sr-only">Fish</dt>
            <dd class="resource-value">
              <img src="./assets/fish.png" alt="" />
              <span data-ui="fish">0</span>
            </dd>
          </div>
          <div class="resource-item">
            <dt class="sr-only">Berries</dt>
            <dd class="resource-value">
              <img src="./assets/berries.png" alt="" />
              <span data-ui="berries">0</span>
            </dd>
          </div>
          <div class="resource-item">
            <dt class="sr-only">Wood</dt>
            <dd class="resource-value">
              <img src="./assets/wood.png" alt="" />
              <span data-ui="wood">0</span>
            </dd>
          </div>
          <div class="fps-item">
            <dt>FPS</dt>
            <dd data-ui="fps">--</dd>
          </div>
        </dl>
      </header>

      <button class="fullscreen-button" type="button" data-ui="fullscreen" aria-label="Enter fullscreen">
        <span aria-hidden="true"></span>
      </button>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
